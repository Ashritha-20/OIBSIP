<!DOCTYPE html>
<html>
<head>

</head>
<body>

<h1>🍕 Pizza Menu</h1>

<div class="menu">

    <div class="card">
        <h3>Margherita</h3>
        <p>₹200</p>

    <div class="card">
        <h3>Farmhouse</h3>
        <p>₹250</p>
        <button onclick="addToCart('Farmhouse',250)">Add</button>

    <div class="card">
        <h3>Pepperoni</h3>
        <p>₹300</p>
        <button onclick="addToCart('Pepperoni',300)">Add</button>
    </div>

</div>

<a href="cart.html"><button class="cartBtn">Go To Cart</button></a>

<script src="script.js"></script>
</body>
</html>
